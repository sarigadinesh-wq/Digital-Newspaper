version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: digital_newspaper_backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: digital_newspaper_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
